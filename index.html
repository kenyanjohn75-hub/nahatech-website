<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NAHATECH LTD</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#0a0a23;
color:white;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo-section{
display:flex;
align-items:center;
gap:10px;
}

.site-logo{
width:55px;
height:55px;
object-fit:contain;
background:white;
border-radius:10px;
padding:5px;
}

.nav-buttons button{
margin:5px;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.cart-btn{background:orange;color:white;}
.admin-btn{background:#25D366;color:white;}

.hero{
background:linear-gradient(to right,#141e30,#243b55);
color:white;
text-align:center;
padding:40px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{color:green;font-weight:bold;}
.stock{font-size:14px;}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.buy{background:green;color:white;}
.cart{background:orange;color:white;}
.delete{background:red;color:white;color:white;}

footer{
background:#0a0a23;
color:white;
text-align:center;
padding:20px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.modal-content{
background:white;
width:90%;
max-width:500px;
margin:5% auto;
padding:20px;
border-radius:10px;
text-align:center;
}

.close{
float:right;
cursor:pointer;
font-size:25px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ddd;
}

.submit-btn{
background:green;
color:white;
width:90%;
padding:12px;
border:none;
border-radius:5px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px;
border-radius:50px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<nav>

<div class="logo-section">
<img src="logo.png" class="site-logo">
<h2>NAHATECH LTD</h2>
</div>

<div class="nav-buttons">
<button class="cart-btn" onclick="openCart()">🛒 Cart</button>
<button class="admin-btn" onclick="openAdmin()">Admin</button>
</div>

</nav>
</header>

<section class="hero">
<h2>Affordable Laptops in Kenya</h2>
<p>HP | Dell | Lenovo | MacBook</p>
</section>

<section class="container" id="shopProducts"></section>

<footer>
<p>📍 Kisii | 📞 +254786467783</p>
</footer>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
<span class="close" onclick="closeCart()">&times;</span>
<h2>Cart</h2>

<div id="cartBox"></div>
<div id="cartTotal"></div>

<button class="submit-btn" onclick="checkout()">Checkout</button>

</div>
</div>

<!-- PAYMENT -->
<div class="modal" id="payModal">
<div class="modal-content">
<span class="close" onclick="closePay()">&times;</span>

<h2>M-PESA PAY</h2>
<h3>0142428852</h3>

<p id="payText"></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button class="submit-btn" onclick="confirmPay()">I HAVE PAID</button>

</div>
</div>

<!-- ADMIN LOGIN -->
<div class="modal" id="adminLogin">
<div class="modal-content">
<span class="close" onclick="closeAdmin()">&times;</span>

<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Password">

<button class="submit-btn" onclick="login()">Login</button>

</div>
</div>

<!-- ADMIN PANEL -->
<div class="modal" id="adminPanel">
<div class="modal-content">
<span class="close" onclick="closePanel()">&times;</span>

<h2>Add Product</h2>

<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pqty" placeholder="Quantity">
<input type="file" id="pimg">

<img id="preview" style="width:100px;display:none;border-radius:10px;">

<button class="submit-btn" onclick="addProduct()">Upload</button>

<hr>

<div id="adminProducts"></div>

</div>
</div>

<a class="whatsapp" href="https://wa.me/254786467783">WhatsApp</a>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-storage-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyC4zvGgSIlN6pk2EaphsqaVavJJz9BkjkU",
authDomain:"nahatech-d3b4d.firebaseapp.com",
projectId:"nahatech-d3b4d",
storageBucket:"nahatech-d3b4d.firebasestorage.app",
appId:"1:436862933673:web:35c6efd934c6b58a2227b8"
});

const db=firebase.firestore();
const storage=firebase.storage();

let cart=[];
let selected="";

/* LOAD PRODUCTS */
async function loadProducts(){
let box=document.getElementById("shopProducts");
box.innerHTML="Loading...";

try{
let snap=await db.collection("products").get();

if(snap.empty){
box.innerHTML="No products";
return;
}

let html="";

snap.forEach(d=>{
let p=d.data();

html+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<div class="stock">Stock:${p.quantity}</div>
<div class="price">KSh ${p.price}</div>

<button class="buy" onclick="pay('${p.name} - ${p.price}')">Buy</button>
<button class="cart" onclick="add('${p.name}',${p.price})">Cart</button>
</div>
`;
});

box.innerHTML=html;

}catch(e){
box.innerHTML="Error loading products";
}
}

/* ADMIN */
function openAdmin(){document.getElementById("adminLogin").style.display="block";}
function closeAdmin(){document.getElementById("adminLogin").style.display="none";}
function closePanel(){document.getElementById("adminPanel").style.display="none";}

function login(){
if(document.getElementById("pass").value==="1234"){
closeAdmin();
document.getElementById("adminPanel").style.display="block";
loadAdmin();
}else alert("Wrong");
}

/* IMAGE PREVIEW */
document.getElementById("pimg").addEventListener("change",e=>{
let f=e.target.files[0];
if(!f)return;

let r=new FileReader();
r.onload=()=>{
document.getElementById("preview").src=r.result;
document.getElementById("preview").style.display="block";
};
r.readAsDataURL(f);
});

/* ADD PRODUCT */
async function addProduct(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let qty=document.getElementById("pqty").value;
let file=document.getElementById("pimg").files[0];

if(!name||!price||!qty||!file)return alert("Fill all");

let ref=storage.ref("products/"+Date.now()+file.name);

await ref.put(file);

let url=await ref.getDownloadURL();

await db.collection("products").add({
name,price:Number(price),quantity:Number(qty),image:url
});

alert("Uploaded");

loadProducts();
loadAdmin();
}

/* ADMIN LIST */
async function loadAdmin(){
let box=document.getElementById("adminProducts");
let snap=await db.collection("products").get();

let html="";

snap.forEach(d=>{
let p=d.data();
html+=`<p>${p.name} - ${p.price}</p>`;
});

box.innerHTML=html;
}

/* CART */
function add(n,p){
cart.push({n,p});
update();
openCart();
}

function update(){
let box=document.getElementById("cartBox");
let total=0;
let html="";

cart.forEach(i=>{
total+=i.p;
html+=`${i.n} - ${i.p}<br>`;
});

box.innerHTML=html;
document.getElementById("cartTotal").innerHTML="Total:"+total;
}

function openCart(){document.getElementById("cartModal").style.display="block";}
function closeCart(){document.getElementById("cartModal").style.display="none";}

/* PAYMENT */
function pay(p){
selected=p;
document.getElementById("payText").innerText=p;
document.getElementById("payModal").style.display="block";
}

function closePay(){document.getElementById("payModal").style.display="none";}

function checkout(){
let t=cart.reduce((a,b)=>a+b.p,0);
pay("Cart Total "+t);
}

function confirmPay(){
let n=document.getElementById("name").value;
let ph=document.getElementById("phone").value;

if(!n||!ph)return alert("Fill all");

window.open(`https://wa.me/254786467783?text=Order:${selected} Name:${n} Phone:${ph}`,"_blank");
closePay();
}

/* START */
loadProducts();

</script>

</body>
  </html>
