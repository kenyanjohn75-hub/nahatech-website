<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

const firebaseConfig = {

apiKey: "AIzaSyC4zvGgSIlN6pk2EaphsqaVavJJz9BkjkU",

authDomain: "nahatech-d3b4d.firebaseapp.com",

projectId: "nahatech-d3b4d",

storageBucket: "nahatech-d3b4d.firebasestorage.app",

messagingSenderId: "436862933673",

appId: "1:436862933673:web:35c6efd934c6b58a2227b8",

measurementId: "G-CPJBQZ8F1K"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);

let products = [];

let cart = [];

let selectedProduct = "";

/* LOAD SHOP */

async function loadShop(){

let container =
document.getElementById("shopProducts");

container.innerHTML = "Loading products...";

const querySnapshot =
await getDocs(collection(db,"products"));

container.innerHTML = "";

products = [];

querySnapshot.forEach((docItem)=>{

let p = docItem.data();

products.push(p);

container.innerHTML += `

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="stock">
Stock: ${p.quantity}
</div>

<div class="price">
KSh ${Number(p.price).toLocaleString()}
</div>

<button
class="buy"
onclick="showPayment('${p.name} - KSh ${p.price}')">

Buy Now

</button>

<button
class="cart"
onclick="addToCart('${p.name}',${p.price})">

Add to Cart

</button>

</div>

`;

});

if(products.length===0){

container.innerHTML = `

<div style="
grid-column:1/-1;
text-align:center;
padding:40px;
">

<h2>No products uploaded yet</h2>

<p>Upload products from admin panel</p>

</div>

`;

}

}

/* PAYMENT */

window.showPayment = function(product){

selectedProduct = product;

document.getElementById("paymentProduct").innerHTML = `
<b>${product}</b>
`;

document.getElementById("paymentModal").style.display =
"block";

}

window.closePayment = function(){

document.getElementById("paymentModal").style.display =
"none";

}

window.confirmPayment = function(){

let customer =
document.getElementById("mpesaName").value;

let phone =
document.getElementById("mpesaPhone").value;

if(customer==="" || phone===""){

alert("Please fill all details");

return;

}

let message =
"Hello NAHATECH,%0A%0A" +

"I have completed M-PESA payment.%0A%0A" +

"Customer Name: " + customer + "%0A" +

"Phone: " + phone + "%0A" +

"Product: " + selectedProduct + "%0A%0A" +

"Please confirm my order.";

window.open(
"https://wa.me/254786467783?text=" + message,
"_blank"
);

closePayment();

}

/* CART */

window.addToCart = function(model,price){

cart.push({
model:model,
price:Number(price)
});

updateCart();

document.getElementById("cartModal").style.display =
"block";

}

function updateCart(){

let cartModel =
document.getElementById("cartModel");

let cartPrice =
document.getElementById("cartPrice");

if(cart.length===0){

cartModel.innerHTML = "Cart is empty";

cartPrice.innerHTML = "";

return;

}

let total = 0;

let html = "";

cart.forEach((item,index)=>{

total += item.price;

html += `

<div style="
border-bottom:1px solid #ddd;
padding:10px;
">

${item.model}<br>

<b>
KSh ${item.price.toLocaleString()}
</b>

<br><br>

<button
class="delete"
onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

cartModel.innerHTML = html;

cartPrice.innerHTML = `
<h3>
Total: KSh ${total.toLocaleString()}
</h3>
`;

}

window.removeItem = function(index){

cart.splice(index,1);

updateCart();

}

window.openCart = function(){

document.getElementById("cartModal").style.display =
"block";

}

window.closeCart = function(){

document.getElementById("cartModal").style.display =
"none";

}

/* CHECKOUT */

window.checkoutPayment = function(){

if(cart.length===0){

alert("Your cart is empty");

return;

}

let total = 0;

cart.forEach(item=>{

total += item.price;

});

selectedProduct =
"Cart Order - Total KSh " +
total.toLocaleString();

document.getElementById("paymentProduct").innerHTML = `

<b>Total Cart Payment:</b><br><br>

KSh ${total.toLocaleString()}

`;

document.getElementById("paymentModal").style.display =
"block";

}

/* ADMIN */

window.openAdmin = function(){

document.getElementById("adminLoginModal").style.display =
"block";

}

window.closeAdminLogin = function(){

document.getElementById("adminLoginModal").style.display =
"none";

}

window.loginAdmin = function(){

let password =
document.getElementById("adminPassword").value;

if(password==="1234"){

closeAdminLogin();

document.getElementById("adminPanelModal").style.display =
"block";

loadAdminProducts();

}else{

alert("Wrong password");

}

}

window.closeAdminPanel = function(){

document.getElementById("adminPanelModal").style.display =
"none";

}

/* IMAGE PREVIEW */

document
.getElementById("productImage")
.addEventListener("change",function(e){

let file = e.target.files[0];

if(!file) return;

let reader = new FileReader();

reader.onload = function(){

document.getElementById("previewImage").src =
reader.result;

document.getElementById("previewImage").style.display =
"block";

};

reader.readAsDataURL(file);

});

/* ADD PRODUCT */

window.addProduct = async function(){

let name =
document.getElementById("productName").value;

let price =
document.getElementById("productPrice").value;

let quantity =
document.getElementById("productQuantity").value;

let file =
document.getElementById("productImage").files[0];

if(!name || !price || !quantity || !file){

alert("Please fill all fields");

return;

}

try{

const imageRef = ref(
storage,
"products/" + Date.now() + file.name
);

await uploadBytes(imageRef,file);

const imageUrl =
await getDownloadURL(imageRef);

await addDoc(collection(db,"products"),{

name:name,

price:Number(price),

quantity:Number(quantity),

image:imageUrl

});

alert("Product uploaded successfully");

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productQuantity").value="";
document.getElementById("productImage").value="";

document.getElementById("previewImage").style.display =
"none";

loadShop();

loadAdminProducts();

}catch(error){

alert(error.message);

}

}

/* ADMIN PRODUCTS */

async function loadAdminProducts(){

let container =
document.getElementById("adminProducts");

container.innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"products"));

querySnapshot.forEach((docItem)=>{

let item = docItem.data();

container.innerHTML += `

<div class="admin-product">

<img src="${item.image}">

<h3>${item.name}</h3>

<p>
<b>Price:</b>
KSh ${Number(item.price).toLocaleString()}
</p>

<p>
<b>Quantity:</b>
${item.quantity}
</p>

</div>

`;

});

}

/* START */

loadShop();

</script>
