<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Buy affordable laptops in Kenya from NAHATECH. HP, Dell, Lenovo, MacBook at best prices in Kisii.">
  <meta name="keywords" content="laptops Kenya, cheap laptops Kisii, HP Dell Lenovo Kenya, NAHATECH">
  <meta name="author" content="NAHATECH">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAHATECH LTD</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #0a0a23;
      color: white;
      padding: 15px;
      position: sticky;
      top: 0;
    }

    header h1 { margin: 0; }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-btn {
      background: orange;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .buy { background: green; color: white; }
    .cart { background: orange; color: white; }

    #cartModal {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -20%);
      background: white;
      padding: 20px;
      width: 300px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      border-radius: 10px;
    }

    footer {
      background: #0a0a23;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <h1>NAHATECH LTD</h1>
      <div class="cart-btn">🛒 Cart</div>
    </nav>
  </header>

  <section class="container">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" alt="HP EliteBook">
      <h3>HP EliteBook 840 G3</h3>
      <p>Core i5, 8GB RAM, 256GB SSD</p>
      <div class="price">KSh 35,000</div>
      <button class="buy">Buy Now</button>
      <button class="cart">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853" alt="Dell Inspiron">
      <h3>Dell Inspiron</h3>
      <p>Core i7, 16GB RAM, 512GB SSD</p>
      <div class="price">KSh 75,000</div>
      <button class="buy">Buy Now</button>
      <button class="cart">Add to Cart</button>
    </div>
  </section>

  <footer>
    <p>📍 Kisii, Kenya | 📞 +254 786467783</p>
    <p>© 2026 NAHATECH LTD</p>
  </footer>
</body>
</html>
