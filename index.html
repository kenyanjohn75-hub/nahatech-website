<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-storage-compat.js"></script>

<script>

firebase.initializeApp({
apiKey: "AIzaSyC4zvGgSIlN6pk2EaphsqaVavJJz9BkjkU",
authDomain: "nahatech-d3b4d.firebaseapp.com",
projectId: "nahatech-d3b4d",
storageBucket: "nahatech-d3b4d.appspot.com",
messagingSenderId: "436862933673",
appId: "1:436862933673:web:59f57109c3ff2ce32227b8"
});

const db = firebase.firestore();
const storage = firebase.storage();

let cart = [];
let selectedProductForPayment = "";

/* LOAD PRODUCTS */
async function loadShop(){

const container=document.getElementById("shopProducts");

container.innerHTML=`
<div style="grid-column:1/-1;text-align:center;padding:40px;">
Loading products...
</div>
`;

try{

const snapshot=await db.collection("products").get();

if(snapshot.empty){

container.innerHTML=`
<div style="grid-column:1/-1;text-align:center;padding:40px;">
<h2>No products found</h2>
</div>
`;

return;
}

let html="";

snapshot.forEach(doc=>{

const p=doc.data();

html+=`

<div class="card">

<img 
src="${p.image || 'https://placehold.co/400x300?text=NAHATECH'}"
alt="${p.name}"
onerror="this.src='https://placehold.co/400x300?text=NAHATECH'"
>

<h3>${p.name || 'No Name'}</h3>

<div class="stock">
📦 In Stock: ${p.quantity || 0}
</div>

<div class="price">
KSh ${Number(p.price || 0).toLocaleString()}
</div>

<button 
class="buy"
onclick="showPayment('${p.name} - KSh ${p.price}')"
>
💳 Buy Now
</button>

<button 
class="cart"
onclick="addToCart('${p.name}',${p.price})"
>
🛒 Add to Cart
</button>

</div>

`;

});

container.innerHTML=html;

}catch(error){

console.log(error);

container.innerHTML=`
<div style="grid-column:1/-1;text-align:center;padding:40px;color:red;">
Failed to load products
</div>
`;

}

}

/* CART */

function addToCart(name,price){

cart.push({
name:name,
price:Number(price)
});

updateCartDisplay();

document.getElementById("cartModal").style.display="block";

}

function updateCartDisplay(){

document.getElementById("cartCountBadge").innerText=cart.length;

let cartBox=document.getElementById("cartModel");

let total=0;

let html="";

cart.forEach((item,index)=>{

total+=item.price;

html+=`

<div style="padding:10px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;">

<div>
<b>${item.name}</b><br>
KSh ${item.price.toLocaleString()}
</div>

<button 
class="delete"
onclick="removeCart(${index})"
>
Remove
</button>

</div>

`;

});

cartBox.innerHTML=html;

document.getElementById("cartPrice").innerHTML=`
💰 Total: KSh ${total.toLocaleString()}
`;

}

function removeCart(index){

cart.splice(index,1);

updateCartDisplay();

}

function openCart(){

updateCartDisplay();

document.getElementById("cartModal").style.display="block";

}

function closeCart(){

document.getElementById("cartModal").style.display="none";

}

/* PAYMENT */

function showPayment(product){

selectedProductForPayment=product;

document.getElementById("paymentProduct").innerHTML=`
<b>${product}</b>
`;

document.getElementById("paymentModal").style.display="block";

}

function closePayment(){

document.getElementById("paymentModal").style.display="none";

}

function confirmPayment(){

const customerName=document.getElementById("mpesaName").value;

const customerPhone=document.getElementById("mpesaPhone").value;

if(!customerName || !customerPhone){

alert("Fill all details");

return;

}

let msg=
`*NAHATECH ORDER*%0A%0A`+
`Customer: ${customerName}%0A`+
`Phone: ${customerPhone}%0A`+
`Order: ${selectedProductForPayment}%0A%0A`+
`Payment completed successfully`;

window.open(
`https://wa.me/254786467783?text=${msg}`,
"_blank"
);

closePayment();

}

/* CHECKOUT */

function checkoutPayment(){

if(cart.length===0){

alert("Cart is empty");

return;

}

let total=0;

let order="";

cart.forEach(item=>{

total+=item.price;

order+=`${item.name} - KSh ${item.price}%0A`;

});

selectedProductForPayment=
`${order}%0ATotal: KSh ${total}`;

document.getElementById("paymentProduct").innerHTML=`
<b>Cart Total: KSh ${total.toLocaleString()}</b>
`;

document.getElementById("paymentModal").style.display="block";

}

/* ADMIN */

function openAdmin(){

document.getElementById("adminLoginModal").style.display="block";

}

function closeAdminLogin(){

document.getElementById("adminLoginModal").style.display="none";

}

function loginAdmin(){

let password=document.getElementById("adminPassword").value;

if(password==="1234"){

closeAdminLogin();

document.getElementById("adminPanelModal").style.display="block";

loadAdminProducts();

}else{

alert("Wrong password");

}

}

function closeAdminPanel(){

document.getElementById("adminPanelModal").style.display="none";

}

/* IMAGE PREVIEW */

document.getElementById("productImage")
.addEventListener("change",function(e){

let file=e.target.files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(event){

document.getElementById("previewImage").src=event.target.result;

document.getElementById("previewImage").style.display="block";

};

reader.readAsDataURL(file);

});

/* ADD PRODUCT */

async function addProduct(){

try{

let name=document.getElementById("productName").value.trim();

let price=document.getElementById("productPrice").value;

let quantity=document.getElementById("productQuantity").value;

let file=document.getElementById("productImage").files[0];

if(!name || !price || !quantity || !file){

alert("Please fill all fields");

return;

}

const storageRef=storage.ref(
"products/"+Date.now()+"_"+file.name
);

await storageRef.put(file);

const imageUrl=await storageRef.getDownloadURL();

await db.collection("products").add({

name:name,
price:Number(price),
quantity:Number(quantity),
image:imageUrl

});

alert("✅ Product uploaded successfully");

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productQuantity").value="";
document.getElementById("productImage").value="";

document.getElementById("previewImage").style.display="none";

loadShop();

loadAdminProducts();

}catch(error){

console.log(error);

alert(error.message);

}

}

/* ADMIN PRODUCTS */

async function loadAdminProducts(){

let box=document.getElementById("adminProducts");

box.innerHTML="Loading...";

const snapshot=await db.collection("products").get();

let html="";

snapshot.forEach(doc=>{

let p=doc.data();

html+=`

<div class="admin-product">

<img 
src="${p.image}" 
onerror="this.src='https://placehold.co/70x70?text=IMG'"
>

<div style="flex:1;">

<b>${p.name}</b><br>

💰 KSh ${Number(p.price).toLocaleString()}<br>

📦 Stock: ${p.quantity}

</div>

</div>

`;

});

box.innerHTML=html;

}

/* CLOSE MODALS */

window.onclick=function(event){

if(event.target.classList.contains("modal")){

event.target.style.display="none";

}

};

/* START */

loadShop();

</script>
