<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Buy affordable laptops in Kenya from NAHATECH. HP, Dell, Lenovo, MacBook at best prices in Kisii.">

<meta name="keywords" content="laptops Kenya, cheap laptops Kisii, HP Dell Lenovo Kenya, NAHATECH">

<meta name="author" content="NAHATECH">

<title>NAHATECH LTD</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#333;
}

/* HEADER */

header{
background:#0a0a23;
color:white;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.nav-buttons{
display:flex;
gap:10px;
align-items:center;
}

.cart-btn,
.admin-btn{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
color:white;
}

.cart-btn{
background:orange;
}

.admin-btn{
background:#25D366;
}

/* HERO */

.hero{
background:linear-gradient(to right,#141e30,#243b55);
color:white;
text-align:center;
padding:50px 20px;
}

/* PRODUCTS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
margin:10px 0;
font-size:20px;
}

.stock{
font-size:14px;
color:#555;
margin-bottom:10px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.buy{
background:green;
color:white;
}

.cart{
background:orange;
color:white;
}

.delete{
background:red;
color:white;
}

/* FOOTER */

footer{
background:#0a0a23;
color:white;
text-align:center;
padding:20px;
}

/* MODALS */

.modal{
display:none;
position:fixed;
z-index:2000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.modal-content{
background:white;
margin:5% auto;
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
text-align:center;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
font-weight:bold;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ddd;
}

.submit-btn{
background:green;
color:white;
width:90%;
padding:12px;
}

/* ADMIN */

.admin-product{
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.admin-product img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
}

/* WHATSAPP */

.whatsapp-chat{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 18px;
border-radius:50px;
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
z-index:999;
}

.whatsapp-chat img{
width:25px;
}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<nav>

<h1>NAHATECH LTD</h1>

<div class="nav-buttons">

<button class="cart-btn" onclick="openCart()">
🛒 Cart
</button>

<button class="admin-btn" onclick="openAdmin()">
Admin Panel
</button>

</div>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<h2>Affordable Laptops in Kenya</h2>

<p>
Shop HP, Dell, Lenovo and MacBook at the best prices in Kisii.
</p>

</section>

<!-- PRODUCTS -->

<section class="container" id="shopProducts"></section>

<!-- FOOTER -->

<footer>

<p>📍 Kisii, Kenya | 📞 +254786467783</p>

<p>© 2026 NAHATECH LTD</p>

</footer>

<!-- CART MODAL -->

<div id="cartModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeCart()">
&times;
</span>

<h2>🛒 Shopping Cart</h2>

<div id="cartModel"></div>

<div id="cartPrice"></div>

<input id="clientName" placeholder="Your Name">

<input id="clientPhone" placeholder="Phone Number">

<button class="submit-btn" onclick="submitOrder()">
Checkout via WhatsApp
</button>

</div>

</div>

<!-- ADMIN LOGIN -->

<div id="adminLoginModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeAdminLogin()">
&times;
</span>

<h2>Admin Login</h2>

<input
type="password"
id="adminPassword"
placeholder="Enter Password">

<button
class="submit-btn"
onclick="loginAdmin()">

Login

</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanelModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeAdminPanel()">
&times;
</span>

<h2>NAHATECH ADMIN PANEL</h2>

<input
type="text"
id="productName"
placeholder="Product Name">

<input
type="number"
id="productPrice"
placeholder="Price in KSh">

<input
type="number"
id="productQuantity"
placeholder="Quantity">

<input
type="file"
id="productImage"
accept="image/*">

<br><br>

<img
id="previewImage"
style="
width:120px;
display:none;
border-radius:10px;
">

<br><br>

<button class="submit-btn" onclick="addProduct()">
Upload Product
</button>

<hr>

<h3>Manage Products</h3>

<div id="adminProducts"></div>

</div>

</div>

<!-- WHATSAPP -->

<a
href="https://wa.me/254786467783"
target="_blank"
class="whatsapp-chat">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

Chat with us

</a>

<script>

/* STORAGE */

let products =
JSON.parse(localStorage.getItem("nahatech_products")) || [];

let cart = [];

let uploadedImage = "";

/* LOAD SHOP */

function loadShop(){

let container =
document.getElementById("shopProducts");

container.innerHTML = "";

if(products.length===0){

container.innerHTML = `

<div style="
grid-column:1/-1;
text-align:center;
padding:40px;
">

<h2>No products uploaded yet</h2>

<p>
Open Admin Panel and upload products
</p>

</div>

`;

return;

}

products.forEach((p,index)=>{

container.innerHTML += `

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="stock">
Stock: ${p.quantity}
</div>

<div class="price">
KSh ${Number(p.price).toLocaleString()}
</div>

<button
class="buy"
onclick="showPayment('${p.name} - KSh ${p.price}')">

Buy Now

</button>

<button
class="cart"
onclick="addToCart('${p.name}',${p.price})">

Add to Cart

</button>

</div>

`;

});

}

/* BUY NOW */

function showPayment(product){

window.open(
"https://wa.me/254786467783?text=" +
encodeURIComponent(
"Hello NAHATECH, I want to buy: " + product
),
"_blank"
);

}

/* CART */

function addToCart(model,price){

cart.push({
model:model,
price:Number(price)
});

updateCart();

document.getElementById("cartModal").style.display =
"block";

}

function updateCart(){

let cartModel =
document.getElementById("cartModel");

let cartPrice =
document.getElementById("cartPrice");

if(cart.length===0){

cartModel.innerHTML = "Cart is empty";

cartPrice.innerHTML = "";

return;

}

let total = 0;

let html = "";

cart.forEach((item,index)=>{

total += item.price;

html += `

<div style="
border-bottom:1px solid #ddd;
padding:10px;
">

${item.model}<br>

<b>
KSh ${item.price.toLocaleString()}
</b>

<br><br>

<button
class="delete"
onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

cartModel.innerHTML = html;

cartPrice.innerHTML = `
<h3>
Total: KSh ${total.toLocaleString()}
</h3>
`;

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function openCart(){

document.getElementById("cartModal").style.display =
"block";

}

function closeCart(){

document.getElementById("cartModal").style.display =
"none";

}

/* CHECKOUT */

function submitOrder(){

if(cart.length===0){

alert("Your cart is empty");

return;

}

let customer =
document.getElementById("clientName").value;

let phone =
document.getElementById("clientPhone").value;

let total = 0;

let message =
"🛒 *NAHATECH ORDER*%0A%0A";

message +=
"Customer: " + customer + "%0A";

message +=
"Phone: " + phone + "%0A%0A";

message +=
"*Items Ordered*%0A";

cart.forEach((item,index)=>{

total += item.price;

message +=
(index+1)+". "+
item.model+
" - KSh "+
item.price.toLocaleString()+
"%0A";

});

message +=
"%0A*TOTAL: KSh "+
total.toLocaleString()+
"*";

window.open(
"https://wa.me/254786467783?text=" +
message,
"_blank"
);

}

/* ADMIN */

function openAdmin(){

document.getElementById("adminLoginModal").style.display =
"block";

}

function closeAdminLogin(){

document.getElementById("adminLoginModal").style.display =
"none";

}

function loginAdmin(){

let password =
document.getElementById("adminPassword").value;

if(password==="1234"){

closeAdminLogin();

document.getElementById("adminPanelModal").style.display =
"block";

loadAdminProducts();

}else{

alert("Wrong password");

}

}

function closeAdminPanel(){

document.getElementById("adminPanelModal").style.display =
"none";

}

/* IMAGE */

document
.getElementById("productImage")
.addEventListener("change",function(e){

let file = e.target.files[0];

if(!file) return;

let reader = new FileReader();

reader.onload = function(){

uploadedImage = reader.result;

document.getElementById("previewImage").src =
uploadedImage;

document.getElementById("previewImage").style.display =
"block";

};

reader.readAsDataURL(file);

});

/* ADD PRODUCT */

function addProduct(){

let name =
document.getElementById("productName").value;

let price =
document.getElementById("productPrice").value;

let quantity =
document.getElementById("productQuantity").value;

if(name==="" || price==="" || quantity===""){

alert("Please fill all fields");

return;

}

if(uploadedImage===""){

alert("Please upload product image");

return;

}

products.push({

name:name,
price:Number(price),
quantity:Number(quantity),
image:uploadedImage

});

localStorage.setItem(
"nahatech_products",
JSON.stringify(products)
);

alert("Product uploaded successfully");

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productQuantity").value="";
document.getElementById("productImage").value="";

uploadedImage="";

document.getElementById("previewImage").style.display =
"none";

loadShop();

loadAdminProducts();

}

/* LOAD ADMIN PRODUCTS */

function loadAdminProducts(){

let container =
document.getElementById("adminProducts");

container.innerHTML = "";

products =
JSON.parse(
localStorage.getItem("nahatech_products")
) || [];

products.forEach((item,index)=>{

container.innerHTML += `

<div class="admin-product">

<img src="${item.image}">

<h3>${item.name}</h3>

<p>
<b>Price:</b>
KSh ${Number(item.price).toLocaleString()}
</p>

<p>
<b>Quantity:</b>
${item.quantity}
</p>

<button
style="
background:#1976d2;
color:white;
"
onclick="editProduct(${index})">

Edit

</button>

<button
class="delete"
onclick="deleteProduct(${index})">

Delete

</button>

</div>

`;

});

}

/* DELETE PRODUCT */

function deleteProduct(index){

if(confirm("Delete this product?")){

products.splice(index,1);

localStorage.setItem(
"nahatech_products",
JSON.stringify(products)
);

loadShop();

loadAdminProducts();

}

}

/* EDIT PRODUCT */

function editProduct(index){

let newPrice =
prompt(
"Enter new price",
products[index].price
);

let newQuantity =
prompt(
"Enter new quantity",
products[index].quantity
);

if(newPrice!==null){

products[index].price = Number(newPrice);

}

if(newQuantity!==null){

products[index].quantity =
Number(newQuantity);

}

localStorage.setItem(
"nahatech_products",
JSON.stringify(products)
);

loadShop();

loadAdminProducts();

}

/* START */

loadShop();

</script>

</body>
</html>
