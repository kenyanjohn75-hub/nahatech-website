<body>

<header>
<nav>

<div class="logo-section">
<img src="logo.png" class="site-logo">
<div class="brand-text">
<h1>NAHATECH LTD</h1>
<p>Smart Tech Solutions</p>
</div>
</div>

<div class="nav-buttons">
<button class="cart-btn" onclick="openCart()">🛒 Cart</button>
<button class="admin-btn" onclick="openAdmin()">Admin</button>
</div>

</nav>
</header>

<section class="hero">
<h2>Affordable Laptops in Kenya</h2>
<p>Shop HP, Dell, Lenovo and MacBook at best prices.</p>
</section>

<section class="container" id="shopProducts"></section>

<footer>
<p>📍 Kisii, Kenya | 📞 +254786467783</p>
<p>© 2026 NAHATECH LTD</p>
</footer>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeCart()">&times;</span>
<h2>Cart</h2>

<div id="cartModel"></div>
<div id="cartPrice"></div>

<button class="submit-btn" onclick="checkoutPayment()">
Proceed to Payment
</button>

</div>
</div>

<!-- PAYMENT -->
<div id="paymentModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closePayment()">&times;</span>

<h2>M-PESA PAYMENT</h2>
<h1>0142428852</h1>

<p id="paymentProduct"></p>

<input id="mpesaName" placeholder="Name">
<input id="mpesaPhone" placeholder="Phone">

<button class="submit-btn" onclick="confirmPayment">
I HAVE PAID
</button>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-storage-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyC4zvGgSIlN6pk2EaphsqaVavJJz9BkjkU",
authDomain:"nahatech-d3b4d.firebaseapp.com",
projectId:"nahatech-d3b4d",
storageBucket:"nahatech-d3b4d.firebasestorage.app",
appId:"1:436862933673:web:35c6efd934c6b58a2227b8"
});

const db = firebase.firestore();
const storage = firebase.storage();

let cart=[];
let selectedProduct="";

/* FIXED PRODUCT LOADER */
async function loadShop(){
let container=document.getElementById("shopProducts");

container.innerHTML="<h3>Loading products...</h3>";

try{

const snapshot=await db.collection("products").get();

if(snapshot.empty){
container.innerHTML="<h3>No products available</h3>";
return;
}

let html="";

snapshot.forEach(doc=>{
let p=doc.data();

html+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<div class="stock">Stock: ${p.quantity}</div>
<div class="price">KSh ${Number(p.price).toLocaleString()}</div>

<button class="buy"
onclick="showPayment('${p.name} - KSh ${p.price}')">
Buy
</button>

<button class="cart"
onclick="addToCart('${p.name}',${p.price})">
Add
</button>
</div>
`;
});

container.innerHTML=html;

}catch(err){
console.error(err);
container.innerHTML="<h3 style='color:red'>Failed to load products</h3>";
}
}

/* CART */
function addToCart(name,price){
cart.push({name,price:Number(price)});
updateCart();
openCart();
}

function updateCart(){
let c=document.getElementById("cartModel");
let p=document.getElementById("cartPrice");

if(cart.length===0){
c.innerHTML="Empty cart";
p.innerHTML="";
return;
}

let total=0;
let html="";

cart.forEach((i,index)=>{
total+=i.price;

html+=`
<div>
${i.name}<br>
<b>KSh ${i.price}</b>
<button class="delete" onclick="removeItem(${index})">X</button>
</div>
`;
});

c.innerHTML=html;
p.innerHTML=`<h3>Total: KSh ${total}</h3>`;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function openCart(){
document.getElementById("cartModal").style.display="block";
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

/* PAYMENT */
function showPayment(product){
selectedProduct=product;
document.getElementById("paymentProduct").innerText=product;
document.getElementById("paymentModal").style.display="block";
}

function closePayment(){
document.getElementById("paymentModal").style.display="none";
}

function checkoutPayment(){
let total=cart.reduce((a,b)=>a+b.price,0);
showPayment("Cart Total KSh "+total);
}

function confirmPayment(){
let name=document.getElementById("mpesaName").value;
let phone=document.getElementById("mpesaPhone").value;

if(!name||!phone){
alert("Fill all fields");
return;
}

window.open(
`https://wa.me/254786467783?text=Order:%20${selectedProduct}%0AName:%20${name}%0APhone:%20${phone}`,
"_blank"
);

closePayment();
}

loadShop();

</script>

</body>
</html>
