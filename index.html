<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAHATECH LTD</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#0a0a23;color:white;
padding:15px;position:sticky;top:0;
}

nav{display:flex;justify-content:space-between;flex-wrap:wrap}

.logo-section{display:flex;gap:10px;align-items:center}

.site-logo{width:55px;height:55px;background:white;padding:5px;border-radius:10px}

.brand-text h1{margin:0;font-size:20px}

.nav-buttons{display:flex;gap:10px}

button{padding:10px;border:none;cursor:pointer;border-radius:5px;font-weight:bold}

.cart-btn{background:orange;color:white}
.admin-btn{background:#25D366;color:white}

/* PRODUCTS */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;padding:10px;border-radius:10px;text-align:center;
}

.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}

.price{color:green;font-weight:bold}

/* MODALS */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;margin:10% auto;padding:15px;
width:90%;max-width:500px;border-radius:10px;text-align:center;
}

/* DASHBOARD */
.order-box{
border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px;text-align:left;
}

</style>
</head>

<body>

<header>
<nav>

<div class="logo-section">
<img src="logo.png" class="site-logo">
<div class="brand-text">
<h1>NAHATECH LTD</h1>
</div>
</div>

<div class="nav-buttons">
<button class="cart-btn" onclick="openCart()">🛒 Cart</button>
<button class="admin-btn" onclick="openAdmin()">Admin</button>
<button class="admin-btn" onclick="openDashboard()">📊 Sales</button>
</div>

</nav>
</header>

<section class="container" id="shop"></section>

<footer style="text-align:center;padding:15px;background:#0a0a23;color:white">
📍 Kisii | 📞 +254786467783
</footer>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="modal-content">

<h2>Cart</h2>
<div id="cartItems"></div>
<div id="cartTotal"></div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button onclick="checkout()">Checkout</button>

</div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="modal">
<div class="modal-content">

<h2>Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="modal">
<div class="modal-content">

<h2>📊 Sales Dashboard</h2>

<div id="summary"></div>
<div id="orders"></div>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

/* LOAD PRODUCTS */
function load(){
let box = document.getElementById("shop");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">KSh ${p.price}</p>

<button onclick="buy('${p.name}',${p.price})">Buy</button>
<button onclick="add('${p.name}',${p.price})">Cart</button>
</div>`;
});
}

/* BUY */
function buy(name,price){

let id="NAHA-"+Math.floor(Math.random()*99999);

window.open(
`https://wa.me/254786467783?text=${encodeURIComponent(
"Order ID:"+id+" Item:"+name+" Price:"+price+" Pay M-Pesa 0142428852"
)}`,'_blank'
);

/* SMS ALERT HOOK */
sendSMS("New Order: "+id+" Item:"+name+" Price:"+price);

alert("Pay M-Pesa: 0142428852");
}

/* SMS FUNCTION (REQUIRES AFRICAS TALKING API) */
function sendSMS(msg){

// OPTIONAL: activate later with API key
console.log("SMS:",msg);

}

/* CART */
function add(name,price){
cart.push({name,price});
openCart();
update();
}

function update(){
let t=0;
let html="";

cart.forEach(i=>{
t+=i.price;
html+=`<p>${i.name} - KSh ${i.price}</p>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("cartTotal").innerHTML="Total: KSh "+t;
}

/* CHECKOUT + SAVE ORDER */
function checkout(){

if(cart.length===0)return;

let id="NAHA-"+Math.floor(Math.random()*99999);
let total=0;
let items="";

cart.forEach(i=>{
total+=i.price;
items+=i.name+" - "+i.price+"\n";
});

let order={
id,
items,
total,
date:new Date().toLocaleString()
};

let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

window.open(
`https://wa.me/254786467783?text=${encodeURIComponent(
"Order ID:"+id+"\n"+items+"Total:"+total+"\nPay 0142428852"
)}`,'_blank'
);

/* SMS ALERT */
sendSMS("ORDER "+id+" TOTAL "+total);

cart=[];
}

/* ADMIN */
function addProduct(){
products.push({
name:document.getElementById("pname").value,
price:document.getElementById("pprice").value,
img:document.getElementById("pimg").value
});

localStorage.setItem("products",JSON.stringify(products));
load();
}

/* DASHBOARD */
function openDashboard(){
document.getElementById("dash").style.display="block";

let orders=JSON.parse(localStorage.getItem("orders"))||[];
let total=0;
let html="";

orders.forEach(o=>{
total+=o.total;
html+=`
<div class="order-box">
<b>${o.id}</b><br>
${o.items}<br>
<b>KSh ${o.total}</b><br>
${o.date}
</div>`;
});

document.getElementById("summary").innerHTML=
"<h3>Total Sales: KSh "+total+"</h3>";

document.getElementById("orders").innerHTML=html;
}

/* MODALS */
function openCart(){document.getElementById("cartModal").style.display="block"}
function openAdmin(){document.getElementById("adminModal").style.display="block"}

load();

</script>

</body>
  </html>
