<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAHATECH LTD</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{
background:#0a0a23;
color:white;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.site-logo{
width:50px;height:50px;background:white;border-radius:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
}

.buy{background:green;color:white;}
.cart{background:orange;color:white;}

.modal{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
z-index:2000;
}

.modal-content{
background:white;
width:90%;
max-width:500px;
margin:5% auto;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:5px;
}

.submit-btn{
background:green;
color:white;
width:90%;
padding:12px;
border:none;
border-radius:5px;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<nav>
<img src="logo.png" class="site-logo">
<button onclick="openAdmin()">Admin</button>
</nav>
</header>

<div class="container" id="shopProducts"></div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<span class="close" onclick="closeLogin()">&times;</span>
<h2>Admin Login</h2>
<input id="pass" type="password" placeholder="Password">
<button class="submit-btn" onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminPanel">
<div class="modal-content">
<span class="close" onclick="closeAdmin()">&times;</span>

<h2>Add Product</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Quantity">
<input type="file" id="img">

<img id="preview" style="width:100px;display:none;margin-top:10px;border-radius:10px;">

<button class="submit-btn" onclick="addProduct()">Upload</button>

<hr>

<div id="adminList"></div>
</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-storage-compat.js"></script>

<script>

firebase.initializeApp({
apiKey: "AIzaSyC4zvGgSIlN6pk2EaphsqaVavJJz9BkjkU",
authDomain: "nahatech-d3b4d.firebaseapp.com",
projectId: "nahatech-d3b4d",
storageBucket: "nahatech-d3b4d.appspot.com",
messagingSenderId: "436862933673",
appId: "1:436862933673:web:59f57109c3ff2ce32227b8"
});

const db = firebase.firestore();
const storage = firebase.storage();

/* LOAD PRODUCTS (FIXED SAFE VERSION) */
async function loadProducts(){

let box=document.getElementById("shopProducts");
box.innerHTML="Loading products...";

try{

const snap=await db.collection("products").get();

if(snap.empty){
box.innerHTML="No products found";
return;
}

let html="";

snap.forEach(doc=>{
let p=doc.data();

html+=`
<div class="card">
<img src="${p.image || ''}">
<h3>${p.name || 'No name'}</h3>
<p>Price: KSh ${p.price || 0}</p>
<p>Stock: ${p.quantity || 0}</p>
</div>
`;
});

box.innerHTML=html;

}catch(err){
console.log(err);
box.innerHTML="Error loading products";
}

}

/* ADMIN */
function openAdmin(){
document.getElementById("loginModal").style.display="block";
}

function closeLogin(){
document.getElementById("loginModal").style.display="none";
}

function login(){
if(document.getElementById("pass").value==="1234"){
closeLogin();
document.getElementById("adminPanel").style.display="block";
loadAdmin();
}else alert("Wrong password");
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

/* IMAGE PREVIEW */
document.getElementById("img").addEventListener("change",e=>{
let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();
reader.onload=()=>{
document.getElementById("preview").src=reader.result;
document.getElementById("preview").style.display="block";
};
reader.readAsDataURL(file);
});

/* ADD PRODUCT (FULL FIXED) */
async function addProduct(){

try{

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let qty=document.getElementById("qty").value;
let file=document.getElementById("img").files[0];

if(!name||!price||!qty||!file){
alert("Fill all fields");
return;
}

const ref=storage.ref("products/"+Date.now()+file.name);
await ref.put(file);

const url=await ref.getDownloadURL();

const data={
name:name,
price:Number(price),
quantity:Number(qty),
image:url
};

console.log("Saving:",data);

await db.collection("products").add(data);

alert("Upload successful!");

loadProducts();
loadAdmin();

}catch(err){
console.log(err);
alert(err.message);
}

}

/* ADMIN LIST */
async function loadAdmin(){

let box=document.getElementById("adminList");
box.innerHTML="Loading...";

const snap=await db.collection("products").get();

let html="";

snap.forEach(doc=>{
let p=doc.data();
html+=`<p>${p.name || 'No name'} - KSh ${p.price || 0}</p>`;
});

box.innerHTML=html;

}

/* START */
loadProducts();

</script>

</body>
  </html>
